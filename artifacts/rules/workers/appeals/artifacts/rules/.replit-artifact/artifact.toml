kind = "web"
previewPath = "/"
title = "Балканский Конфликт — Правила Сервера"
version = "1.0.0"
id = "artifacts/rules"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25432

[services.development]
run = "pnpm --filter @workspace/rules run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rules", "run", "build" ]
publicDir = "artifacts/rules/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25432"
BASE_PATH = "/"
